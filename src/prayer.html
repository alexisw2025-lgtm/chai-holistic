<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>2AM Companion · Daily Prayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c08830;
      --gold-light: #deb96a;
      --deep: #050a08;
      --midnight: #080d10;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--midnight);
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── BACKGROUND — deeper, more midnight than affirmation ── */
    .bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 20%, rgba(30,50,80,.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 20% 70%, rgba(100,60,20,.07) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 80% 60%, rgba(80,40,120,.06) 0%, transparent 55%),
        linear-gradient(180deg, #06090e 0%, #080d10 50%, #040608 100%);
      animation: ambientBreath 10s ease-in-out infinite alternate;
    }
    @keyframes ambientBreath {
      from { opacity: .7; }
      to   { opacity: 1; }
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 8%,  rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 15%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 30%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 8%  55%, rgba(255,255,255,.2)  0%, transparent 100%),
        radial-gradient(1px 1px at 92% 65%, rgba(255,255,255,.3)  0%, transparent 100%),
        radial-gradient(1px 1px at 33% 85%, rgba(255,255,255,.2)  0%, transparent 100%),
        radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,.25) 0%, transparent 100%);
    }

    /* ── PARTICLES ── */
    #particles { position:fixed;inset:0;pointer-events:none;z-index:1; }
    .p {
      position:absolute; border-radius:50%;
      animation: pFly var(--d) var(--dl) ease-out forwards;
    }
    @keyframes pFly {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--ex),var(--ey)) scale(0); opacity:0; }
    }

    /* ── MAIN ── */
    .container {
      position:fixed; inset:0; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px 28px env(safe-area-inset-bottom,20px);
      gap:0;
    }

    /* ── TIME ── */
    .time-display {
      font-family:'Cinzel',serif;
      font-size:48px; font-weight:400; letter-spacing:.06em;
      color:rgba(255,255,255,.08);
      margin-bottom:6px;
      opacity:0; animation:fadeDown .8s .2s ease forwards;
    }
    .time-sub {
      font-family:'Cinzel',serif;
      font-size:8px; letter-spacing:.32em; text-transform:uppercase;
      color:rgba(192,136,48,.4); margin-bottom:32px;
      opacity:0; animation:fadeDown .8s .35s ease forwards;
    }

    /* ── RING ── */
    .ring-wrap {
      position:relative; width:110px; height:110px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:36px; cursor:pointer;
      opacity:0; animation:fadeDown .8s .5s ease forwards;
    }
    .r-orbit-1 {
      position:absolute; inset:-10px; border-radius:50%;
      border:1.5px solid transparent;
      border-top-color:rgba(192,136,48,.6);
      border-right-color:rgba(192,136,48,.2);
      animation:orbitSpin 4s linear infinite;
    }
    .r-orbit-2 {
      position:absolute; inset:-18px; border-radius:50%;
      border:1px solid transparent;
      border-bottom-color:rgba(150,100,200,.3);
      border-left-color:rgba(150,100,200,.1);
      animation:orbitSpin 8s linear infinite reverse;
    }
    .r-pulse {
      position:absolute; inset:0; border-radius:50%;
      border:1.5px solid rgba(192,136,48,.35);
      animation:rPulse 2.8s ease-out infinite;
    }
    .r-pulse-2 { animation-delay:1s; border-color:rgba(150,100,200,.2); }
    .ring-photo {
      width:100px; height:100px; border-radius:50%;
      object-fit:cover; object-position:center;
      border:2.5px solid rgba(192,136,48,.5);
      box-shadow:
        0 0 20px rgba(192,136,48,.3),
        0 0 50px rgba(100,60,180,.15),
        inset 0 0 20px rgba(0,0,0,.5);
      position:relative; z-index:1;
      transition:transform .15s, box-shadow .15s;
    }
    .ring-wrap:active .ring-photo {
      transform:scale(.95);
      box-shadow:0 0 40px rgba(192,136,48,.6),0 0 80px rgba(100,60,180,.25);
    }
    .ring-hint {
      position:absolute; bottom:-22px; left:50%;
      transform:translateX(-50%);
      font-family:'Cinzel',serif; font-size:7.5px;
      letter-spacing:.22em; text-transform:uppercase;
      color:rgba(192,136,48,.4); white-space:nowrap;
      animation:hintPulse 3s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:.4}50%{opacity:.75} }

    /* ── PRAYER TEXT ── */
    .prayer-wrap {
      text-align:center; margin-bottom:28px; max-width:340px;
      opacity:0; animation:fadeUp .9s .7s ease forwards;
    }
    .prayer-rule {
      width:1px; height:24px;
      background:linear-gradient(to bottom, transparent, rgba(192,136,48,.4), transparent);
      margin:10px auto;
    }
    .prayer-line {
      display:block; font-size:clamp(1.1rem,4.5vw,1.45rem);
      font-weight:300; color:rgba(255,255,255,.82);
      line-height:1.6; letter-spacing:.01em;
    }
    .prayer-line.em { color:rgba(192,136,48,.85); font-style:italic; }
    .prayer-line.soft { color:rgba(255,255,255,.5); font-size:clamp(.9rem,3.5vw,1.1rem); }

    /* ── STATUS ── */
    .status {
      font-family:'Cinzel',serif; font-size:8.5px;
      letter-spacing:.2em; text-transform:uppercase;
      color:rgba(192,136,48,.38); margin-bottom:20px;
      min-height:14px; transition:color .5s;
      opacity:0; animation:fadeUp .8s .9s ease forwards;
    }
    .status.loading { color:rgba(192,136,48,.65); }
    .status.speaking { color:rgba(130,180,140,.75); }

    /* ── WAVE ── */
    .wave {
      display:flex; align-items:center; gap:3px; height:16px;
      margin-bottom:20px; opacity:0; transition:opacity .5s;
    }
    .wave.show { opacity:1; }
    .wbar {
      width:2.5px; border-radius:2px;
      background:rgba(130,180,140,.6);
      animation:waveBar .9s ease-in-out infinite;
    }
    .wbar:nth-child(1){height:5px;animation-delay:0s}
    .wbar:nth-child(2){height:9px;animation-delay:.12s}
    .wbar:nth-child(3){height:14px;animation-delay:.22s}
    .wbar:nth-child(4){height:9px;animation-delay:.16s}
    .wbar:nth-child(5){height:5px;animation-delay:.06s}
    @keyframes waveBar {
      0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.25)}
    }

    /* ── DATE ── */
    .date-badge {
      font-family:'Cinzel',serif; font-size:8px;
      letter-spacing:.2em; text-transform:uppercase;
      color:rgba(255,255,255,.14); margin-bottom:28px;
      opacity:0; animation:fadeUp .8s 1.1s ease forwards;
    }

    /* ── BRAND ── */
    .brand {
      position:fixed; bottom:max(24px,env(safe-area-inset-bottom));
      left:0; right:0; text-align:center;
      opacity:0; animation:fadeUp .8s 1.3s ease forwards;
    }
    .brand-name {
      font-family:'Cormorant Garamond',serif;
      font-size:13px; color:rgba(255,255,255,.2); letter-spacing:.12em;
    }
    .brand-sub {
      font-family:'Cinzel',serif; font-size:7px;
      letter-spacing:.26em; text-transform:uppercase;
      color:rgba(192,136,48,.25); margin-top:3px;
    }

    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)}
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}
    }
    @keyframes orbitSpin {
      from{transform:rotate(0deg)} to{transform:rotate(360deg)}
    }
    @keyframes prayerHandsBreathe {
      0%,100% { transform:scale(1);    filter:drop-shadow(0 0 8px rgba(192,136,48,.45)); }
      50%     { transform:scale(1.09); filter:drop-shadow(0 0 16px rgba(192,136,48,.85)); }
    }
    @keyframes rPulse {
      0%{transform:scale(1);opacity:.5} 100%{transform:scale(1.75);opacity:0}
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="stars"></div>
  <div id="particles"></div>

  <div class="container">
    <div class="time-display" id="clockDisplay">2:00</div>
    <div class="time-sub">✦ &nbsp; 2AM Companion · Daily Prayer &nbsp; ✦</div>

    <div class="ring-wrap" id="ringBtn" onclick="playPrayer()">
      <div class="r-orbit-1"></div>
      <div class="r-orbit-2"></div>
      <div class="r-pulse"></div>
      <div class="r-pulse r-pulse-2"></div>
      <div style="width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,220,120,.18) 0%,rgba(192,136,48,.13) 50%,rgba(5,10,8,.78) 100%);border:2.5px solid rgba(192,136,48,.65);box-shadow:0 0 22px rgba(192,136,48,.4),0 0 44px rgba(192,136,48,.16);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;">
      <span style="font-size:46px;animation:prayerHandsBreathe 3s ease-in-out infinite;display:block;filter:drop-shadow(0 0 8px rgba(192,136,48,.5))">🙏</span>
    </div>
      <div class="ring-hint">✦ tap to hear today's prayer</div>
    </div>

    <div class="prayer-wrap">
      <div class="prayer-rule"></div>
      <span class="prayer-line" id="pLine1"></span>
      <span class="prayer-line em" id="pLine2"></span>
      <span class="prayer-line soft" id="pLine3"></span>
      <div class="prayer-rule"></div>
    </div>

    <div class="wave" id="wave">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div>
    </div>

    <div class="status" id="status">✦ tap the ring to hear today's prayer</div>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <div class="brand">
    <div class="brand-name">2AM Companion</div>
    <div class="brand-sub">chaiholistic.com · Vibe Shift Ring</div>
  </div>

  <script>
    const RAILWAY = "https://web-production-4c84.up.railway.app";

    const PRAYERS = [
      {
        lines:["You are not alone in this moment.", "Something greater holds you", "even when you cannot feel it."],
        voice:"You are not alone in this moment. Something greater holds you, even when you cannot feel it. Be still and receive that."
      },
      {
        lines:["Whatever brought you here at this hour,", "you are seen.", "You are known. You are loved."],
        voice:"Whatever brought you here at this hour, you are seen. You are known. You are loved. Let that be enough for right now."
      },
      {
        lines:["The night is not your enemy.", "It is making space", "for something only silence can grow."],
        voice:"The night is not your enemy. It is making space for something only silence can grow. Rest in that truth tonight."
      },
      {
        lines:["You have carried more than they know.", "May you be given exactly", "what you need to keep going."],
        voice:"You have carried more than they know. May you be given exactly what you need to keep going. You are stronger than this moment."
      },
      {
        lines:["This is a prayer for the in-between.", "The waiting. The not-yet.", "You are being prepared, not forgotten."],
        voice:"This is a prayer for the in-between. The waiting. The not-yet. You are being prepared, not forgotten. Hold on."
      },
      {
        lines:["May your body find rest.", "May your mind release its grip.", "May peace come like a slow tide."],
        voice:"May your body find rest. May your mind release its grip. May peace come like a slow tide, quietly, without asking permission."
      },
      {
        lines:["Whatever you lost,", "whatever still aches —", "grief is love with nowhere to go."],
        voice:"Whatever you lost, whatever still aches — grief is love with nowhere to go. May your grief be honored tonight, and may healing come."
      },
      {
        lines:["You do not have to fix it tonight.", "You do not have to have the answer.", "Tonight, you just have to breathe."],
        voice:"You do not have to fix it tonight. You do not have to have the answer. Tonight, you just have to breathe. That is enough."
      },
      {
        lines:["May the fear that woke you", "be replaced by a quiet knowing:", "you will get through this."],
        voice:"May the fear that woke you be replaced by a quiet knowing: you will get through this. You have been through nights before. You are still here."
      },
      {
        lines:["This moment is holy.", "Not because it is easy,", "but because you are in it, still trying."],
        voice:"This moment is holy. Not because it is easy, but because you are in it, still trying. That is the most sacred thing a person can do."
      },
      {
        lines:["There is grace for the tired.", "There is mercy for the uncertain.", "There is room for you exactly as you are."],
        voice:"There is grace for the tired. There is mercy for the uncertain. There is room for you exactly as you are — no performance required."
      },
      {
        lines:["May tomorrow feel lighter.", "May something small bring you joy.", "May you wake with a sense that something good is coming."],
        voice:"May tomorrow feel lighter. May something small bring you joy. May you wake with a sense that something good is coming, because it is."
      },
      {
        lines:["You are not behind.", "You are not too broken.", "You are right on time for your own story."],
        voice:"You are not behind. You are not too broken. You are right on time for your own story. The best chapters are still being written."
      },
      {
        lines:["Whatever you are praying for tonight,", "may the answer come", "in a form you can recognize."],
        voice:"Whatever you are praying for tonight, may the answer come in a form you can recognize. And may you have the courage to receive it."
      },
      {
        lines:["You were made to survive this.", "And more than survive —", "to bloom from it."],
        voice:"You were made to survive this. And more than survive — to bloom from it. The difficulty is not the end of your story. It is the soil."
      },
    ];

    function getDailyPrayer() {
      const now   = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const day   = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      return PRAYERS[day % PRAYERS.length];
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clockDisplay').textContent =
        `${h}:${String(m).padStart(2,'0')}`;
    }

    function spawnParticles() {
      const c = document.getElementById('particles');
      const cols = ['#c08830','#deb96a','#9060d0','#6080c0','#fff4e0'];
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('div');
        el.className = 'p';
        const ang = Math.random() * Math.PI * 2;
        const r   = 50 + Math.random() * 90;
        const ex  = Math.cos(ang) * r;
        const ey  = Math.sin(ang) * r - Math.random() * 30;
        const sz  = 1.5 + Math.random() * 3;
        const dl  = Math.random() * 0.4;
        const d   = 0.8 + Math.random() * 0.9;
        const col = cols[Math.floor(Math.random() * cols.length)];
        el.style.cssText = `top:50%;left:50%;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 ${sz*2}px ${col};--ex:${ex}px;--ey:${ey}px;--d:${d}s;--dl:${dl}s;animation-delay:${dl}s;`;
        c.appendChild(el);
        setTimeout(() => el.remove(), (dl + d + 0.2) * 1000);
      }
    }

    let audioCtx = null;
    function playBowl(soft = false) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtx;
        const now = ctx.currentTime;
        const tone = (freq, amp, dur, start=0) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          const f = ctx.createBiquadFilter();
          f.type='lowpass'; f.frequency.value=2800;
          o.type='sine';
          o.frequency.setValueAtTime(freq, now+start);
          g.gain.setValueAtTime(0, now+start);
          g.gain.linearRampToValueAtTime(amp*(soft?.45:1), now+start+0.08);
          g.gain.exponentialRampToValueAtTime(0.0001, now+start+dur);
          o.connect(f); f.connect(g); g.connect(ctx.destination);
          o.start(now+start); o.stop(now+start+dur+0.1);
        };
        // Slightly lower, more grounded frequency for prayer vs affirmation
        tone(396, 0.2, 5.5); tone(792, 0.07, 4.2, 0.05);
        tone(528, 0.04, 3.5, 0.28); tone(264, 0.06, 4.0, 0.1);
        if(!soft){ tone(396, 0.08, 3.8, 2.6); }
      } catch(_) {}
    }

    let playing = false;

    async function playPrayer() {
      if (playing) return;
      playing = true;
      const prayer = getDailyPrayer();
      const status = document.getElementById('status');
      const wave   = document.getElementById('wave');

      spawnParticles();
      playBowl(false);

      status.textContent = '✦  your prayer is coming…';
      status.className = 'status loading';

      try {
        const res = await fetch(`${RAILWAY}/speak-intention`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ text: prayer.voice, voice: 'alloy' })
        });
        if (!res.ok) throw new Error('TTS unavailable');

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const audio = new Audio(url);

        audio.onplay = () => {
          status.textContent = '✦  today\'s prayer is speaking…';
          status.className = 'status speaking';
          wave.classList.add('show');
        };
        audio.onended = () => {
          URL.revokeObjectURL(url);
          status.textContent = '✦  you are not praying alone';
          status.className = 'status';
          wave.classList.remove('show');
          playing = false;
          setTimeout(() => playBowl(true), 500);
        };
        await audio.play();

      } catch(err) {
        console.warn('TTS fallback:', err);
        status.textContent = '✦  today\'s prayer is speaking…';
        status.className = 'status speaking';
        wave.classList.add('show');

        const synth = window.speechSynthesis;
        if (synth) {
          synth.cancel();
          const utt = new SpeechSynthesisUtterance(prayer.voice);
          utt.rate = 0.72; utt.pitch = 0.88; utt.volume = 0.92;
          const voices = synth.getVoices();
          const preferred = ['Samantha','Karen','Moira','Fiona','Victoria','Google UK English Female'];
          for (const name of preferred) {
            const v = voices.find(v => v.name.includes(name));
            if (v) { utt.voice = v; break; }
          }
          utt.onend = () => {
            status.textContent = '✦  you are not praying alone';
            status.className = 'status';
            wave.classList.remove('show');
            playing = false;
          };
          synth.speak(utt);
        } else {
          status.textContent = '✦  you are not praying alone';
          status.className = 'status'; wave.classList.remove('show'); playing = false;
        }
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const today = getDailyPrayer();
      document.getElementById('pLine1').textContent = today.lines[0];
      document.getElementById('pLine2').textContent = today.lines[1];
      document.getElementById('pLine3').textContent = today.lines[2];

      updateClock();
      setInterval(updateClock, 30000);

      const now = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('dateBadge').textContent =
        `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    });
  </script>
</body>
</html>
