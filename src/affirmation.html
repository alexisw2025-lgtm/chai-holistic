<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Your Daily Affirmation · Chai Holistic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c08830;
      --gold-light: #deb96a;
      --gold-pale: #f5d080;
      --dark: #0a1a0e;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 50% 30%, rgba(74,160,120,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 70%, rgba(192,136,48,.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(192,136,48,.06) 0%, transparent 55%),
        linear-gradient(160deg, #0a1e14 0%, #0f2418 50%, #0a1a0e 100%);
      animation: ambientShift 8s ease-in-out infinite alternate;
    }
    @keyframes ambientShift {
      from { opacity: .8; }
      to   { opacity: 1;  }
    }

    /* ── PARTICLES ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .p {
      position: absolute;
      border-radius: 50%;
      animation: particleFly var(--d) var(--dl) ease-out forwards;
    }
    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--ex), var(--ey)) scale(0); opacity: 0; }
    }

    /* ── MAIN CONTAINER ── */
    .container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px env(safe-area-inset-bottom, 20px);
      z-index: 2;
      gap: 0;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: rgba(74,160,120,.8);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeDown .8s .3s ease forwards;
    }

    /* ── RING VISUAL ── */
    .ring-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
      cursor: pointer;
      opacity: 0;
      animation: fadeDown .8s .5s ease forwards;
    }
    .ring-orbit-1 {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: rgba(192,136,48,.9);
      border-right-color: rgba(192,136,48,.3);
      animation: orbitSpin 3s linear infinite;
    }
    .ring-orbit-2 {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(192,136,48,.45);
      border-left-color: rgba(192,136,48,.15);
      animation: orbitSpin 6s linear infinite reverse;
    }
    .ring-pulse-1, .ring-pulse-2 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(74,160,120,.5);
      animation: ringPulse 2.2s ease-out infinite;
    }
    .ring-pulse-2 { animation-delay: .7s; }
    .ring-photo {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
      border: 3px solid rgba(192,136,48,.7);
      box-shadow:
        0 0 24px rgba(192,136,48,.5),
        0 0 48px rgba(192,136,48,.2),
        inset 0 0 20px rgba(0,0,0,.3);
      position: relative;
      z-index: 1;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .ring-wrap:active .ring-photo {
      transform: scale(.95);
      box-shadow: 0 0 40px rgba(192,136,48,.7), 0 0 80px rgba(192,136,48,.3);
    }
    .ring-tap-hint {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(74,160,120,.6);
      white-space: nowrap;
      animation: pulse-hint 2.5s ease-in-out infinite;
    }
    @keyframes pulse-hint {
      0%,100% { opacity: .6; }
      50%      { opacity: .95; }
    }

    /* ── INTENTION TEXT ── */
    .intention-wrap {
      text-align: center;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp .9s .7s ease forwards;
    }
    .intention-line {
      display: block;
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      font-weight: 300;
      color: rgba(255,255,255,.88);
      line-height: 1.55;
      letter-spacing: .01em;
    }
    .intention-line:nth-child(2) { color: rgba(192,136,48,.9); font-style: italic; }
    .intention-line:nth-child(3) { color: rgba(255,255,255,.6); font-size: clamp(1rem, 3.5vw, 1.25rem); }
    .rule {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(192,136,48,.5), transparent);
      margin: 14px auto;
    }

    /* ── PLAYING STATE ── */
    .status {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(192,136,48,.5);
      margin-bottom: 24px;
      min-height: 14px;
      opacity: 0;
      animation: fadeUp .8s .9s ease forwards;
      transition: color .4s;
    }
    .status.playing { color: rgba(82,184,130,.8); }
    .status.loading { color: rgba(192,136,48,.7); }

    /* ── WAVE BARS (playing indicator) ── */
    .wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity .4s;
    }
    .wave.show { opacity: 1; }
    .wbar {
      width: 3px;
      border-radius: 2px;
      background: rgba(82,184,130,.7);
      animation: waveBar .8s ease-in-out infinite;
    }
    .wbar:nth-child(1) { animation-delay: 0s;    height: 6px; }
    .wbar:nth-child(2) { animation-delay: .1s;   height: 10px; }
    .wbar:nth-child(3) { animation-delay: .2s;   height: 14px; }
    .wbar:nth-child(4) { animation-delay: .15s;  height: 10px; }
    .wbar:nth-child(5) { animation-delay: .05s;  height: 6px; }
    @keyframes waveBar {
      0%,100% { transform: scaleY(1); }
      50%      { transform: scaleY(.3); }
    }

    /* ── DATE BADGE ── */
    .date-badge {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.2);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .8s 1s ease forwards;
    }

    /* ── BRAND FOOTER ── */
    .brand {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      opacity: 0;
      animation: fadeUp .8s 1.2s ease forwards;
    }
    .brand-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: rgba(255,255,255,.25);
      letter-spacing: .12em;
    }
    .brand-sub {
      font-family: 'Cinzel', serif;
      font-size: 7px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: rgba(192,136,48,.3);
      margin-top: 3px;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes ringPulse {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(1.7); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div id="particles"></div>

  <div class="container">
    <div class="eyebrow">✦ &nbsp; Your Daily Affirmation &nbsp; ✦</div>

    <div class="ring-wrap" id="ringBtn" onclick="playIntention()">
      <div class="ring-orbit-1"></div>
      <div class="ring-orbit-2"></div>
      <div class="ring-pulse-1"></div>
      <div class="ring-pulse-2"></div>
      <div style="width:108px;height:108px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(120,220,180,.18) 0%,rgba(74,160,120,.14) 50%,rgba(4,20,12,.75) 100%);border:3px solid rgba(74,160,120,.65);box-shadow:0 0 24px rgba(74,160,120,.45),0 0 48px rgba(74,160,120,.18);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;">
      <span style="font-size:52px;animation:lotus-breathe 3.5s ease-in-out infinite;display:block;">🪷</span>
    </div>
      <div class="ring-tap-hint">✦ tap to hear</div>
    </div>

    <div class="intention-wrap">
      <div class="rule"></div>
      <span class="intention-line" id="line1"></span>
      <span class="intention-line" id="line2"></span>
      <span class="intention-line" id="line3"></span>
      <div class="rule"></div>
    </div>

    <div class="wave" id="wave">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div>
    </div>

    <div class="status" id="status">✦ tap the ring to hear your intention</div>

    <div class="date-badge" id="dateBadge"></div>
  </div>

  <div class="brand">
    <div class="brand-logo">Chai Holistic</div>
    <div class="brand-sub">Vibe Shift Ring · Your Daily Affirmation</div>
  </div>

  <script>
    const RAILWAY = "https://web-production-4c84.up.railway.app";

    const INTENTIONS = [
      { lines:["You are here at the right moment.", "Something in you already knows.", "Begin."], voice:"You are here at the right moment. Something in you already knows. Begin." },
      { lines:["Take one breath before this cup.", "You are nourishing yourself today.", "That is enough."], voice:"Take one breath before this cup. You are nourishing yourself today. That is enough." },
      { lines:["Stillness is not empty.", "It is full of everything you need.", "Receive it now."], voice:"Stillness is not empty. It is full of everything you need. Receive it now." },
      { lines:["What your body is asking for,", "this blend already knows.", "Trust the ritual."], voice:"What your body is asking for, this blend already knows. Trust the ritual." },
      { lines:["This moment belongs to you.", "No one else. Just you.", "Breathe in."], voice:"This moment belongs to you. No one else. Just you. Breathe in." },
      { lines:["The healing has already begun.", "You chose to show up.", "That is the practice."], voice:"The healing has already begun. You chose to show up. That is the practice." },
      { lines:["You came to the right place.", "Everything you need is here.", "Let it in."], voice:"You came to the right place. Everything you need is here. Let it in." },
      { lines:["Your body is not broken.", "It is asking to be heard.", "This cup is you listening."], voice:"Your body is not broken. It is asking to be heard. This cup is you listening." },
      { lines:["Rest is not weakness.", "It is the soil where healing grows.", "Let yourself rest today."], voice:"Rest is not weakness. It is the soil where healing grows. Let yourself rest today." },
      { lines:["You have carried enough.", "For this moment, put it down.", "The tea will hold you."], voice:"You have carried enough. For this moment, put it down. The tea will hold you." },
      { lines:["What you tend to, grows.", "What you sip with intention, heals.", "Tend to yourself today."], voice:"What you tend to, grows. What you sip with intention, heals. Tend to yourself today." },
      { lines:["Healing is not a destination.", "It is the decision you made", "when you filled the kettle."], voice:"Healing is not a destination. It is the decision you made when you filled the kettle." },
      { lines:["You are good enough.", "Exactly as you are.", "Right now. In this moment."], voice:"You are good enough. Exactly as you are. Right now. In this moment." },
      { lines:["Something ancient is in this cup.", "Generations of healers", "put it here for you."], voice:"Something ancient is in this cup. Generations of healers put it here for you." },
      { lines:["The intention is already set.", "Your body already knows what to do.", "Trust what is growing."], voice:"The intention is already set. Your body already knows what to do. Trust what is growing." },
      { lines:["You are not behind.", "You are right on time.", "The ritual begins now."], voice:"You are not behind. You are right on time. The ritual begins now." },
      { lines:["Breathe in what you need.", "Breathe out what no longer serves.", "This cup carries both."], voice:"Breathe in what you need. Breathe out what no longer serves. This cup carries both." },
      { lines:["Your ancestors knew something", "that science is still catching up to.", "You are the living proof."], voice:"Your ancestors knew something that science is still catching up to. You are the living proof." },
      { lines:["Small rituals build strong lives.", "This cup is not small.", "It is everything."], voice:"Small rituals build strong lives. This cup is not small. It is everything." },
      { lines:["The body speaks before the mind does.", "Your craving for this cup", "was already a prayer."], voice:"The body speaks before the mind does. Your craving for this cup was already a prayer." },
      { lines:["You chose wellness today.", "In a world that makes it hard,", "that is an act of love."], voice:"You chose wellness today. In a world that makes it hard, that is an act of love." },
      { lines:["There is medicine in the pause.", "Before the first sip,", "breathe and receive."], voice:"There is medicine in the pause. Before the first sip, breathe and receive." },
      { lines:["What you put in your body", "becomes the energy you walk with.", "Choose it with care."], voice:"What you put in your body becomes the energy you walk with. Choose it with care." },
      { lines:["Healing is not linear.", "But showing up every day", "is how it happens."], voice:"Healing is not linear. But showing up every day is how it happens." },
      { lines:["This is your medicine.", "Not prescribed by anyone else.", "You knew what you needed."], voice:"This is your medicine. Not prescribed by anyone else. You knew what you needed." },
      { lines:["The world will keep moving.", "This cup will not.", "For this moment, neither will you."], voice:"The world will keep moving. This cup will not. For this moment, neither will you." },
      { lines:["Let the warmth reach the tight places.", "The held-in places.", "The places still healing."], voice:"Let the warmth reach the tight places. The held-in places. The places still healing." },
      { lines:["You are someone worth caring for.", "Start with this cup.", "Then keep going."], voice:"You are someone worth caring for. Start with this cup. Then keep going." },
      { lines:["Something in you said yes today.", "To nourishment. To ritual. To yourself.", "Honor that yes."], voice:"Something in you said yes today. To nourishment. To ritual. To yourself. Honor that yes." },
      { lines:["The herbs remember.", "What the body forgets,", "the plants have kept safe."], voice:"The herbs remember. What the body forgets, the plants have kept safe." },
      { lines:["Today's intention is simple:", "show up for yourself", "the way you show up for everyone else."], voice:"Today's intention is simple: show up for yourself the way you show up for everyone else." },
    ];

    function getDailyIntention() {
      const now   = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const day   = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      return INTENTIONS[day % INTENTIONS.length];
    }

    function spawnParticles() {
      const c = document.getElementById('particles');
      const colors = ['#c08830','#deb96a','#f5d080','#52b882','#fff8e8'];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'p';
        const ang = Math.random() * Math.PI * 2;
        const r   = 60 + Math.random() * 100;
        const ex  = Math.cos(ang) * r;
        const ey  = Math.sin(ang) * r - Math.random() * 40;
        const sz  = 2 + Math.random() * 4;
        const dl  = Math.random() * 0.3;
        const d   = 0.7 + Math.random() * 0.8;
        const col = colors[Math.floor(Math.random() * colors.length)];
        el.style.cssText = `top:50%;left:50%;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 ${sz*2}px ${col};--ex:${ex}px;--ey:${ey}px;--d:${d}s;--dl:${dl}s;animation-delay:${dl}s;`;
        c.appendChild(el);
        setTimeout(() => el.remove(), (dl + d + 0.2) * 1000);
      }
    }

    let playing = false;

    async function playIntention() {
      if (playing) return;
      playing = true;

      const intention = getDailyIntention();
      const status = document.getElementById('status');
      const wave   = document.getElementById('wave');

      spawnParticles();

      // Play bowl tone
      playBowl();

      status.textContent = '✦  preparing your affirmation…';
      status.className = 'status loading';

      try {
        const res = await fetch(`${RAILWAY}/speak-intention`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: intention.voice, voice: 'alloy' })
        });

        if (!res.ok) throw new Error('TTS unavailable');

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const audio = new Audio(url);

        audio.onplay = () => {
          status.textContent = '✦  your affirmation is speaking…';
          status.className = 'status playing';
          wave.classList.add('show');
        };
        audio.onended = () => {
          URL.revokeObjectURL(url);
          status.textContent = '✦  carry this with you today ✦';
          status.className = 'status';
          wave.classList.remove('show');
          playing = false;
          setTimeout(playBowl, 400);
        };

        await audio.play();

      } catch (err) {
        // Fallback to browser speech
        console.warn('TTS fallback:', err);
        status.textContent = '✦  your affirmation is speaking…';
        status.className = 'status playing';
        wave.classList.add('show');

        const synth = window.speechSynthesis;
        if (synth) {
          synth.cancel();
          const utt = new SpeechSynthesisUtterance(intention.voice);
          utt.rate = 0.78; utt.pitch = 0.92; utt.volume = 0.9;
          const voices = synth.getVoices();
          const preferred = ['Samantha','Karen','Moira','Fiona','Google UK English Female'];
          for (const name of preferred) {
            const v = voices.find(v => v.name.includes(name));
            if (v) { utt.voice = v; break; }
          }
          utt.onend = () => {
            status.textContent = '✦  carry this with you today';
            status.className = 'status';
            wave.classList.remove('show');
            playing = false;
          };
          synth.speak(utt);
        } else {
          status.textContent = '✦  carry this with you today';
          status.className = 'status';
          wave.classList.remove('show');
          playing = false;
        }
      }
    }

    let audioCtx = null;
    function playBowl() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtx;
        const now = ctx.currentTime;
        const tone = (freq, amp, dur, start=0) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          const f = ctx.createBiquadFilter();
          f.type = 'lowpass'; f.frequency.value = 3200;
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, now + start);
          g.gain.setValueAtTime(0, now + start);
          g.gain.linearRampToValueAtTime(amp, now + start + 0.06);
          g.gain.exponentialRampToValueAtTime(0.0001, now + start + dur);
          o.connect(f); f.connect(g); g.connect(ctx.destination);
          o.start(now + start); o.stop(now + start + dur + 0.1);
        };
        tone(432, 0.22, 4.5); tone(864, 0.07, 3.5, 0.04); tone(528, 0.04, 3.0, 0.25);
      } catch(_) {}
    }

    // Init on load
    window.addEventListener('DOMContentLoaded', () => {
      const today = getDailyIntention();

      document.getElementById('line1').textContent = today.lines[0];
      document.getElementById('line2').textContent = today.lines[1];
      document.getElementById('line3').textContent = today.lines[2];

      const now = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('dateBadge').textContent =
        `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

      // Pre-load voices for browser fallback
      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    });
  </script>
</body>
</html>
