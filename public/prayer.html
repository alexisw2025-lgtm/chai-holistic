:root{

body{background:var(--dark);color:var(--cream);font-family:'Georgia','Times New Roman',serif;

.header{width:100%;text-align:center;padding:36px 24px 24px;

.lang-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:16px 20px 0;max-width:500px;width:100%;}
.lang-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);
  font-size:11px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.lang-btn.active{background:rgba(196,137,58,0.15);border-color:var(--gold);color:var(--gold);}
.tabs{display:flex;gap:0;max-width:500px;width:100%;margin:20px 20px 0;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.tab{flex:1;padding:11px 8px;background:transparent;border:none;color:var(--muted);font-size:11px;
  font-family:'Helvetica Neue',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.4px;text-align:center;}
.tab.active{background:rgba(196,137,58,0.15);color:var(--gold);}
.tab+.tab{border-left:1px solid var(--border);}
.section{display:none;width:100%;max-width:500px;padding:20px 20px 0;}
.section.visible{display:block;}
.daily-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:28px 24px 24px;position:relative;overflow:hidden;}
.daily-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.prayer-meta{text-align:center;margin-bottom:20px;}
.prayer-num{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'Helvetica Neue',sans-serif;font-weight:300;margin-bottom:6px;}
.prayer-title{font-size:clamp(16px,4.5vw,20px);font-style:italic;font-weight:normal;color:var(--cream);margin-bottom:4px;line-height:1.4;}
.prayer-theme{font-size:11px;color:var(--muted);font-style:italic;font-family:'Helvetica Neue',sans-serif;}
.divider{width:36px;height:1px;background:var(--gold);margin:14px auto;opacity:.5;}
.prayer-body{font-size:clamp(13px,3.6vw,15px);line-height:2;color:rgba(247,242,234,.88);}
.prayer-body p{margin-bottom:12px;}
.prayer-body p:last-child{margin-bottom:0;}
.opening{color:var(--gold);font-style:italic;font-size:clamp(14px,3.8vw,16px);display:block;margin-bottom:16px;}
.amen{display:block;margin-top:18px;color:var(--gold2);font-style:italic;font-size:clamp(14px,3.8vw,16px);letter-spacing:1px;}
.audio-row{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:24px;}
.play-btn{width:60px;height:60px;border-radius:50%;border:1.5px solid var(--gold);background:rgba(196,137,58,.1);color:var(--gold);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;position:relative;}
.play-btn:hover{background:rgba(196,137,58,.2);transform:scale(1.05);}
.play-btn.playing{background:rgba(196,137,58,.25);}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.5);opacity:0;}}
.play-btn.playing::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--gold);animation:pulse-ring 1.5s ease-out infinite;}
.audio-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:'Helvetica Neue',sans-serif;}
.audio-src{display:none;}
.progress-bar{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;display:none;}
.progress-bar.on{display:block;}
.progress-fill{height:100%;background:var(--gold);width:0%;transition:width .5s linear;border-radius:2px;}
.daily-nav{display:flex;gap:10px;margin-top:16px;}
.ghost-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);
  font-size:11px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;transition:all .2s;text-align:center;}
.ghost-btn:hover{border-color:var(--gold);color:var(--cream);}
.select-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  font-family:'Helvetica Neue',sans-serif;margin-bottom:8px;}
.custom-select{position:relative;margin-bottom:16px;}
.custom-select select{width:100%;padding:14px 44px 14px 16px;border-radius:14px;
  border:1px solid var(--border);background:rgba(20,28,20,0.95);color:var(--cream);
  font-size:14px;font-family:'Georgia','Times New Roman',serif;outline:none;
  appearance:none;-webkit-appearance:none;cursor:pointer;transition:all .2s;line-height:1.4;}
.custom-select select:focus{border-color:rgba(196,137,58,.55);background:rgba(255,255,255,.06);}
.custom-select select option{background:#111810;color:#F7F2EA;}
.select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--gold);font-size:12px;}
.results-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:10px;}
.prayer-list{display:flex;flex-direction:column;gap:8px;}

.prayer-row-title{font-size:13px;color:var(--cream);font-style:italic;line-height:1.4;margin-bottom:2px;}
.prayer-row-theme{font-size:10px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;}
.prayer-row-badge{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(196,137,58,.12);color:var(--gold);font-family:'Helvetica Neue',sans-serif;white-space:nowrap;flex-shrink:0;}
.prayer-row-badge.recorded{background:rgba(80,180,100,.1);color:#6dbf7e;}
.no-results{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;font-style:italic;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}

.overlay-card{background:var(--dark2);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;position:relative;}

// ── MOOD TAGS (language-independent, used for matching) ─────────────────────
const MOOD_TAGS = [
  ["grief","loss","sad","mourning","heartbreak"],
  ["anxious","anxiety","fear","worry","panic","stress"],
  ["sleep","rest","night","restless","peace"],
  ["lonely","alone","isolated","connection"],
  ["gratitude","thankful","grateful","blessings"],
  ["strength","tired","exhausted","courage"],
  ["lost","direction","confused","purpose","guidance"],
  ["healing","sick","pain","recovery","body"],
  ["surrender","let go","forgiveness","release"],
  ["new beginning","fresh start","hope","change"],
  ["family","loved ones","intercession","someone"],
  ["body","health","healing","wellness","nourishment"],
];

// ── STATE ────────────────────────────────────────────────────────────────────
let lang = 'en';
let dailyIdx = getDailyIndex();
let overlayIdx = null;
let activePlayer = null, isPlaying = false, isTTSLoading = false;
const audioEl = document.getElementById('audio-el');
// Cache: translated prayer stanzas keyed by "lang:idx"
const translationCache = {};
// Cache: TTS audio URLs keyed by "lang:idx"
const ttsCache = {};

function getDailyIndex(){
  const diff = Math.floor((new Date() - new Date('2026-01-01')) / 86400000);
  return diff % PRAYERS.length;
}

// ── LANGUAGE SWITCH ──────────────────────────────────────────────────────────
function setLang(l, btn){
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  stopAudio();
  applyUIStrings();
  rebuildDropdowns();
  renderDailyPrayer();
  // Re-render open overlay if any
  if(overlayIdx !== null && document.getElementById('overlay').classList.contains('open')){
    openOverlay(overlayIdx);
  }
}

function T(key){ return (UI_STRINGS[lang] || UI_STRINGS.en)[key]; }

function applyUIStrings(){
  // Tabs
  document.querySelectorAll('.tab')[0].textContent = T('tab_today');
  document.querySelectorAll('.tab')[1].textContent = T('tab_choose');
  // Section labels
  const labels = document.querySelectorAll('.select-label');
  if(labels[0]) labels[0].textContent = T('how_feeling');
  if(labels[1]) labels[1].textContent = T('or_direct');
  // Audio labels
  document.querySelectorAll('.audio-label').forEach(el => el.textContent = T('listen'));
  // Nav buttons
  const navBtns = document.querySelectorAll('.ghost-btn');
  if(navBtns[0]) navBtns[0].textContent = T('prev');
  if(navBtns[1]) navBtns[1].textContent = T('next');
  // Prayer number label in daily view
  const p = PRAYERS[dailyIdx];
  document.getElementById('d-num').textContent = T('prayer_label') + (dailyIdx+1) + T('of') + PRAYERS.length;
}

// ── DROPDOWNS ────────────────────────────────────────────────────────────────
function rebuildDropdowns(){
  buildMoodDropdown();
  buildPrayerDropdown();
  // Clear results
  document.getElementById('prayer-list').innerHTML = '';
  document.getElementById('results-label').textContent = '';
}

function buildMoodDropdown(){
  const sel = document.getElementById('mood-select');
  sel.innerHTML = '<option value="">' + T('choose_mood') + '</option>';
  const moods = T('moods');
  moods.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.icon + ' ' + m.name + ' — ' + m.sub;
    sel.appendChild(opt);
  });
}

function buildPrayerDropdown(){
  const sel = document.getElementById('prayer-select');
  sel.innerHTML = '<option value="">' + T('browse_prayers') + '</option>';
  PRAYERS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = (i+1) + '. ' + p.title;
    sel.appendChild(opt);
  });
}

// ── PRAYER RENDERING ─────────────────────────────────────────────────────────
function showTab(name, btn){
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  document.getElementById('tab-' + name).classList.add('visible');
  stopAudio();
}

function renderBody(el, stanzas){
  el.innerHTML = '';
  stanzas.forEach((s, i) => {
    const p = document.createElement('p');
    const lines = s.replace(/\n/g, '<br/>');
    const firstLine = s.split('\n')[0].trim();
    const isAmen = /^amen\.?$/i.test(firstLine);
    if(i === 0) p.innerHTML = '<span class="opening">' + lines + '</span>';
    else if(isAmen) p.innerHTML = '<span class="amen">' + lines + '</span>';
    else p.innerHTML = lines;
    el.appendChild(p);
  });
}

async function renderDailyPrayer(){
  const p = PRAYERS[dailyIdx];
  document.getElementById('d-num').textContent = T('prayer_label') + (dailyIdx+1) + T('of') + PRAYERS.length;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-theme').textContent = p.theme;
  // Show English immediately while translation loads
  renderBody(document.getElementById('d-body'), p.stanzas);
  if(lang !== 'en'){
    const stanzas = await getTranslatedStanzas(dailyIdx);
    renderBody(document.getElementById('d-body'), stanzas);
  }
}

function shiftDaily(dir){
  dailyIdx = (dailyIdx + dir + PRAYERS.length) % PRAYERS.length;
  stopAudio();
  renderDailyPrayer();
}

// ── TRANSLATION (Anthropic API) ───────────────────────────────────────────────
async function getTranslatedStanzas(idx){
  const key = lang + ':' + idx;
  if(translationCache[key]) return translationCache[key];
  const p = PRAYERS[idx];
  const langNames = {es:'Spanish',fr:'French',pt:'Portuguese',ht:'Haitian Creole',jm:'Jamaican Patois (Patwa) — write it authentically the way a Jamaican would naturally speak and write it, using real Patwa spelling, grammar and phrasing'};
  const targetLang = langNames[lang] || 'English';
  const prompt = `Translate the following Catholic prayer stanzas to ${targetLang}. Return ONLY a JSON array of translated strings, one per stanza, preserving line breaks (\\n) exactly. Do not add any preamble or markdown.\n\n${JSON.stringify(p.stanzas)}`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content.map(c=>c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const stanzas = JSON.parse(clean);
    translationCache[key] = stanzas;
    return stanzas;
  }catch(e){
    console.error('Translation failed',e);
    return p.stanzas; // fallback to English
  }
}

// ── CHOOSE TAB ────────────────────────────────────────────────────────────────
function onMoodSelect(sel){
  if(!sel.value){
    document.getElementById('prayer-list').innerHTML='';
    document.getElementById('results-label').textContent='';
    return;
  }
  document.getElementById('prayer-select').value='';
  const moodIdx = parseInt(sel.value);
  const tags = MOOD_TAGS[moodIdx];
  const name = T('moods')[moodIdx].name;
  const res = PRAYERS.filter(p => p.tags.some(t => tags.some(mt => t.includes(mt)||mt.includes(t))));
  renderList(res, T('prayers_for') + name + '"');
}

function onPrayerSelect(sel){
  if(!sel.value) return;
  document.getElementById('mood-select').value='';
  document.getElementById('results-label').textContent='';
  document.getElementById('prayer-list').innerHTML='';
  openOverlay(parseInt(sel.value));
  sel.value='';
}

function renderList(prayers, label){
  document.getElementById('results-label').textContent = label;
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  if(!prayers.length){
    list.innerHTML = '<div class="no-results">' + T('no_match') + '</div>';
    return;
  }
  prayers.forEach(p => {
    const idx = PRAYERS.indexOf(p);
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.innerHTML = '<div class="prayer-row-left"><div class="prayer-row-title">' + p.title + '</div><div class="prayer-row-theme">' + p.theme + '</div></div>';
    row.onclick = () => openOverlay(idx);
    list.appendChild(row);
  });
}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
async function openOverlay(idx){
  overlayIdx = idx;
  const p = PRAYERS[idx];
  document.getElementById('o-num').textContent = T('prayer_label') + (idx+1) + T('of') + PRAYERS.length;
  document.getElementById('o-title').textContent = p.title;
  document.getElementById('o-theme').textContent = p.theme;
  renderBody(document.getElementById('o-body'), p.stanzas);
  stopAudio();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Translate overlay body if needed
  if(lang !== 'en'){
    const stanzas = await getTranslatedStanzas(idx);
    renderBody(document.getElementById('o-body'), stanzas);
    document.getElementById('o-num').textContent = T('prayer_label') + (idx+1) + T('of') + PRAYERS.length;
  }
}

function closeOverlay(e){
  if(e.target === document.getElementById('overlay')) closeOverlayDirect();
}
function closeOverlayDirect(){
  stopAudio();
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── AUDIO (Anthropic TTS via browser fetch) ───────────────────────────────────
async function handlePlay(player){
  if(isPlaying && activePlayer === player){ stopAudio(); return; }
  if(isTTSLoading) return;
  stopAudio();
  activePlayer = player;
  const idx = player === 'daily' ? dailyIdx : overlayIdx;
  await playTTS(idx, player);
}

async function playTTS(idx, player){
  const cacheKey = lang + ':' + idx;
  // Use cached audio blob URL if available
  if(ttsCache[cacheKey]){
    playUrl(ttsCache[cacheKey], player);
    return;
  }
  isTTSLoading = true;
  setUI(player, 'loading');
  try{
    // Get stanzas (translated if needed)
    let stanzas = PRAYERS[idx].stanzas;
    if(lang !== 'en') stanzas = await getTranslatedStanzas(idx);
    const text = stanzas.join('\n\n');

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user', content:`Please read this prayer aloud slowly and reverently, in a warm and calming voice:\n\n${text}`}]
      })
    });
    const data = await res.json();
    // Anthropic text response — use browser Speech Synthesis as TTS
    const spokenText = data.content.map(c=>c.type==='text'?c.text:'').join('') || text;
    speakWithBrowser(spokenText, player, cacheKey);
  }catch(e){
    console.error('TTS error',e);
    isTTSLoading = false;
    setUI(player,'idle');
  }
}

function speakWithBrowser(text, player, cacheKey){
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.82;
  utt.pitch = 0.95;
  utt.volume = 1;
  // Pick a calm voice if available
  const voices = window.speechSynthesis.getVoices();
  const langMap = {en:'en',es:'es',fr:'fr',pt:'pt',ht:'fr',jm:'en'}; // Haitian Creole falls back to French voice
  const preferred = voices.find(v => v.lang.startsWith(langMap[lang]||'en') && /google|premium|enhanced/i.test(v.name))
    || voices.find(v => v.lang.startsWith(langMap[lang]||'en'))
    || voices[0];
  if(preferred) utt.voice = preferred;
  isTTSLoading = false;
  isPlaying = true;
  setUI(player, 'playing');
  utt.onend = () => stopAudio();
  utt.onerror = () => { stopAudio(); };
  window.speechSynthesis.speak(utt);
  // Fake progress bar using estimated duration
  startFakeProgress(player, text.length * 55); // ~55ms per char at rate 0.82
}

function playUrl(url, player){
  audioEl.src = url; audioEl.load();
  audioEl.play().then(() => {
    isPlaying = true; setUI(player, 'playing'); startProg(player);
  }).catch(e => { console.error(e); setUI(player,'idle'); });
  audioEl.onended = () => stopAudio();
}

function stopAudio(){
  window.speechSynthesis.cancel();
  audioEl.pause(); audioEl.currentTime = 0;
  isPlaying = false; isTTSLoading = false;
  if(activePlayer) setUI(activePlayer, 'idle');
  activePlayer = null;
}

function setUI(player, state){
  const D = player === 'daily';
  const btn  = document.getElementById(D?'d-play':'o-play');
  const icon = document.getElementById(D?'d-icon':'o-icon');
  const prog = document.getElementById(D?'d-prog':'o-prog');
  btn.classList.remove('playing','loading');
  if(state==='playing'){ btn.classList.add('playing'); icon.textContent='⏸'; prog.classList.add('on'); }
  else if(state==='loading'){ btn.classList.add('loading'); icon.innerHTML='<div class="spinner"></div>'; }
  else{ icon.textContent='▶'; prog.classList.remove('on'); document.getElementById(D?'d-fill':'o-fill').style.width='0%'; }
}

function startProg(player){
  const fill = document.getElementById(player==='daily'?'d-fill':'o-fill');
  const iv = setInterval(()=>{
    if(!isPlaying||audioEl.paused){ clearInterval(iv); return; }
    if(audioEl.duration) fill.style.width = (audioEl.currentTime/audioEl.duration*100)+'%';
  },500);
}

function startFakeProgress(player, durationMs){
  const fill = document.getElementById(player==='daily'?'d-fill':'o-fill');
  const start = Date.now();
  const iv = setInterval(()=>{
    if(!isPlaying){ clearInterval(iv); return; }
    const pct = Math.min(((Date.now()-start)/durationMs)*100, 99);
    fill.style.width = pct + '%';
    if(pct >= 99) clearInterval(iv);
  },300);
}

// Preload voices for speech synthesis
window.speechSynthesis.onvoiceschanged = () => {};
window.speechSynthesis.getVoices();

applyUIStrings();
buildMoodDropdown();
buildPrayerDropdown();
renderDailyPrayer();
</script>
